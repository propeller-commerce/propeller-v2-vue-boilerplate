#   rules:
#     - if: $CI_COMMIT_BRANCH == "master"

deploy:prod:
  stage: deploy
  #needs: ["buildFrontend:prod", "buildCMS:prod"]
  needs: ["buildFrontend:prod"]
  variables:
    USER_PROD: "vueboilerplate"
  script:
    #- sudo -u ${USER_PROD} bash -c "cd /home/${USER_PROD}/public_html; devbox run deploy-prod"
    - sudo -u ${USER_PROD} bash -c "cd /home/${USER_PROD}/public_html; devbox run deploy-frontend-prod"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# -- Stage: mirror ------------------------------------------------------------
# One-way, SCRUBBED mirror of develop/master to the PUBLIC GitHub repo.
#
# This boilerplate tracks private development files (Claude config/skills,
# CLAUDE.md at root + frontend/, and the deploy Taskfile with real server paths
# and usernames) that must NEVER reach the public mirror. The job builds an
# ephemeral scrubbed commit in the CI runner and force-pushes THAT to GitHub.
# GitLab branches are never pushed to and remain untouched.
#
# Requires CI/CD variable GITHUB_TOKEN (repo scope), Masked + Protected.
mirror_to_github:
  stage: mirror
  # Decouple from the deploy pipeline: an empty `needs` makes this job start
  # immediately at pipeline creation instead of waiting for the source/build/
  # deploy stages (which run `devbox` on self-hosted runners and may not run
  # on every push). The mirror must publish regardless of the deploy outcome.
  needs: []
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - master
    - main
  before_script:
    - git --version
  script:
    - echo "Mirroring to GitHub (scrubbed)..."
    - 'GHTOKEN=$(printf "%s" "${GITHUB_TOKEN}" | tr -d " \t\r\n")'
    - test -n "${GHTOKEN}" || { echo "GITHUB_TOKEN is empty (is the branch protected?); aborting."; exit 1; }
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - 'AUTH_HEADER="Authorization: Basic $(printf "x-access-token:%s" "${GHTOKEN}" | base64 | tr -d "\n")"'
    - git remote add github https://github.com/propeller-commerce/propeller-v2-vue-boilerplate.git || true
    - git fetch origin --unshallow || git fetch origin || true
    - git rm -r --cached --ignore-unmatch .claude CLAUDE.md frontend/CLAUDE.md memory Taskfile.yml >/dev/null 2>&1 || true
    - 'git commit -m "chore(mirror): strip private dev files for public mirror" --no-verify || echo "nothing to scrub"'
    - git -c http.extraheader="${AUTH_HEADER}" push --no-thin github HEAD:refs/heads/master --force
    - git -c http.extraheader="${AUTH_HEADER}" push --no-thin github --tags --force
  when: on_success
  allow_failure: false

# -- Stage: release ------------------------------------------------------------
# Automatic GitHub Release, cut on the mirrored commit. Idempotent +
# Unreleased-gated. propeller-vue has no root package.json - the version lives
# in frontend/package.json; the CHANGELOG lives at the repo root. Reuses
# GITHUB_TOKEN.
release_to_github:
  stage: release
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - master
    - main
  needs:
    - mirror_to_github
  before_script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
  script:
    - echo "Evaluating release gate..."
    # Version comes from frontend/package.json (no root package.json here).
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' frontend/package.json | head -n1)
    - 'echo "frontend/package.json version: ${VERSION}"'
    - test -n "$VERSION" || { echo "Could not parse version; aborting."; exit 1; }
    - TAG="v${VERSION}"
    - 'GHTOKEN=$(printf "%s" "${GITHUB_TOKEN}" | tr -d " \t\r\n")'
    - test -n "${GHTOKEN}" || { echo "GITHUB_TOKEN is empty; aborting."; exit 1; }
    - 'AUTH_HEADER="Authorization: Basic $(printf "x-access-token:%s" "${GHTOKEN}" | base64 | tr -d "\n")"'
    - git remote add github https://github.com/propeller-commerce/propeller-v2-vue-boilerplate.git || true
    - |
      REPO="propeller-commerce/propeller-v2-vue-boilerplate"
      REL_HTTP=$(curl -sS -o /dev/null -w "%{http_code}" \
        -H "Authorization: token ${GHTOKEN}" -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${REPO}/releases/tags/${TAG}")
      if [ "$REL_HTTP" = "200" ]; then
        echo "GitHub Release ${TAG} already exists - nothing to do.";
        exit 0;
      fi
      echo "No GitHub Release for ${TAG} yet (HTTP ${REL_HTTP}); proceeding."
    - |
      if grep -Eiq "^##[[:space:]]*\[${VERSION}\][^\n]*unreleased" CHANGELOG.md; then
        echo "CHANGELOG marks ${VERSION} as Unreleased - skipping release per policy.";
        exit 0;
      fi
    - |
      awk -v ver="$VERSION" '
        $0 ~ ("^## [[]" ver "[]]") {grab=1; next}
        grab && $0 ~ "^## [[]" {exit}
        grab {print}
      ' CHANGELOG.md > RELEASE_BODY.md
    - test -s RELEASE_BODY.md || { echo "Empty CHANGELOG section for ${VERSION}; aborting."; exit 1; }
    - 'echo "--- release body ---"; cat RELEASE_BODY.md'
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git tag -a "${TAG}" -m "Release ${TAG}" || true
    - git -c http.extraheader="${AUTH_HEADER}" push --no-thin github "refs/tags/${TAG}" || true
    - |
      PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
        --rawfile body RELEASE_BODY.md \
        '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
      HTTP=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
        -H "Authorization: token ${GHTOKEN}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/propeller-commerce/propeller-v2-vue-boilerplate/releases \
        -d "$PAYLOAD")
      echo "GitHub API HTTP ${HTTP}"; cat resp.json
      case "$HTTP" in 2*) echo "Release ${TAG} created.";; *) echo "Release API call failed."; exit 1;; esac
  when: on_success
  allow_failure: true

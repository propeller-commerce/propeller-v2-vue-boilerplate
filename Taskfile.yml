version: "3"

dotenv:
  - .env.local # Highest priority - local developer overrides
  - .env.{{.ENV}} # Environment-specific settings

vars:
  # GitLab CI predefined variables will be available in the environment
  BUILD_PATH: '{{.BUILD_PATH | default "/home/gitlab-runner/private"}}'
  CI_COMMIT_BRANCH: "{{.CI_COMMIT_BRANCH}}"
  CI_REPOSITORY_URL: "{{.CI_REPOSITORY_URL}}"
  APP_PORT_PROD: '{{.APP_PORT_PROD | default "3000"}}'
  CMS_PORT_PROD: '{{.CMS_PORT_PROD | default "1337"}}'
  APP_PORT_DEV: '{{.APP_PORT_DEV | default "3001"}}'
  CMS_PORT_DEV: '{{.CMS_PORT_DEV | default "1338"}}'
  DEPLOY_PATH_PROD: '{{.DEPLOY_PATH_PROD | default "/home/vueboilerplate/public_html"}}'
  DEPLOY_PATH_DEV: '{{.DEPLOY_PATH_DEV | default "/home/vueboilerplatedev/public_html"}}'
  OWNER_PROD: '{{.OWNER_PROD | default "vueboilerplate"}}'
  OWNER_DEV: '{{.OWNER_DEV | default "vueboilerplatedev"}}'

tasks:

  sync-config:
    desc: "Syncs devbox.json, devbox.lock, Taskfile.yml, rsync-exclude.txt to PROD (master) or DEV (develop) based on CI_COMMIT_BRANCH."
    dir: "{{.BUILD_PATH}}/source"
    cmds:
      - |
        if [ "{{.CI_COMMIT_BRANCH}}" = "master" ]; then
          [ ! -d "{{.DEPLOY_PATH_PROD}}" ] && sudo mkdir -p {{.DEPLOY_PATH_PROD}}
          echo "Syncing config files to PROD ({{.DEPLOY_PATH_PROD}})..."
          sudo rsync -a devbox.json devbox.lock Taskfile.yml rsync-exclude.txt {{.DEPLOY_PATH_PROD}}/
          sudo chown {{.OWNER_PROD}}:{{.OWNER_PROD}} {{.DEPLOY_PATH_PROD}}/devbox.json {{.DEPLOY_PATH_PROD}}/devbox.lock {{.DEPLOY_PATH_PROD}}/Taskfile.yml {{.DEPLOY_PATH_PROD}}/rsync-exclude.txt
        elif [ "{{.CI_COMMIT_BRANCH}}" = "develop" ]; then
          [ ! -d "{{.DEPLOY_PATH_DEV}}" ] && sudo mkdir -p {{.DEPLOY_PATH_DEV}}
          echo "Syncing config files to DEV ({{.DEPLOY_PATH_DEV}})..."
          sudo rsync -a devbox.json devbox.lock Taskfile.yml rsync-exclude.txt {{.DEPLOY_PATH_DEV}}/
          sudo chown {{.OWNER_DEV}}:{{.OWNER_DEV}} {{.DEPLOY_PATH_DEV}}/devbox.json {{.DEPLOY_PATH_DEV}}/devbox.lock {{.DEPLOY_PATH_DEV}}/Taskfile.yml {{.DEPLOY_PATH_DEV}}/rsync-exclude.txt
        else
          echo "Branch '{{.CI_COMMIT_BRANCH}}' is neither 'master' nor 'develop'. Skipping config sync."
          exit 1
        fi

  get-source:
    desc: "Clones the repository into the build path."
    dir: "{{.BUILD_PATH}}"
    cmds:
      - echo "Cleaning old build..."
      - sudo rm -rf *
      - echo "Getting source..."
      - git clone {{.CI_REPOSITORY_URL}} source
      - cd source && git checkout {{.CI_COMMIT_BRANCH}}

  _build-frontend:
    internal: true
    dir: "{{.BUILD_PATH}}/source/frontend"
    cmds:
      - echo "$ENV_FILE" > .env
      - npm install
      - NODE_ENV=production npm run build
      - echo "Cleaning old build artifacts..."
      - sudo rm -rf {{.DEPLOY_PATH}}/frontend/.next
      - echo "Copying files to {{.DEPLOY_PATH}}"
      - sudo rsync -a --delete --exclude-from="../rsync-exclude.txt" {{.BUILD_PATH}}/source/frontend/ {{.DEPLOY_PATH}}/frontend/
      - sudo chown -R {{.OWNER}}:{{.OWNER}} {{.DEPLOY_PATH}}

  build-frontend-prod:
    desc: "Builds the frontend application for PROD."
    cmds:
      - task: _build-frontend
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_PROD}}", OWNER: "{{.OWNER_PROD}}" }

  build-frontend-dev:
    desc: "Builds the frontend application for DEV."
    cmds:
      - task: _build-frontend
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_DEV}}", OWNER: "{{.OWNER_DEV}}" }

  _build-cms:
    internal: true
    dir: "{{.BUILD_PATH}}/source/cms"
    cmds:
      - echo "$ENV_FILE_CMS" > .env
      - |
        strapi_exists=$(sudo sh -c 'if [ ! -d "{{.DEPLOY_PATH}}/cms/.strapi" ]; then echo "false"; fi')                                                                            
        if [ "$strapi_exists" == "false" ]; then
          echo "Strapi does not exist, building..."
          npm install
          NODE_ENV=production npm run build
          sudo rsync -a {{.BUILD_PATH}}/source/cms/ {{.DEPLOY_PATH}}/cms/
        elif git -C {{.BUILD_PATH}}/source diff HEAD~1 --name-only | grep -q '^cms/'; then
          echo "CMS changes detected, rebuilding..."
          npm install
          NODE_ENV=production npm run build
          sudo rsync -a --delete --exclude-from="../rsync-exclude.txt" {{.BUILD_PATH}}/source/cms/ {{.DEPLOY_PATH}}/cms/
        else
          echo "No CMS changes, skipping build."
        fi
      - sudo chown -R {{.OWNER}}:{{.OWNER}} {{.DEPLOY_PATH}}

  build-cms-prod:
    desc: "Builds the Strapi CMS for PROD. Rebuilds only when cms/ directory has changed."
    cmds:
      - task: _build-cms
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_PROD}}", OWNER: "{{.OWNER_PROD}}" }

  build-cms-dev:
    desc: "Builds the Strapi CMS for DEV. Rebuilds only when cms/ directory has changed."
    cmds:
      - task: _build-cms
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_DEV}}", OWNER: "{{.OWNER_DEV}}" }

  _deploy-frontend:
    internal: true
    dir: "{{.DEPLOY_PATH}}/frontend"
    cmds:
      - pm2 delete {{.PM2_NAME}} || true
      - unset name; PORT={{.APP_PORT}} NODE_ENV=production pm2 start npm --name {{.PM2_NAME}} -- run start -- --hostname 127.0.0.1
      - pm2 save

  deploy-frontend-prod:
    desc: "Deploy the frontend for PROD."
    cmds:
      - task: _deploy-frontend
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_PROD}}", APP_PORT: "{{.APP_PORT_PROD}}", PM2_NAME: "frontend-prod" }

  deploy-frontend-dev:
    desc: "Deploy the frontend for DEV."
    cmds:
      - task: _deploy-frontend
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_DEV}}", APP_PORT: "{{.APP_PORT_DEV}}", PM2_NAME: "frontend-dev" }

  _deploy-cms:
    internal: true
    dir: "{{.DEPLOY_PATH}}/cms"
    cmds:
      - pm2 delete {{.PM2_NAME}} || true
      - unset name; PORT={{.CMS_PORT}} NODE_ENV=production pm2 start npm --name {{.PM2_NAME}} -- run start
      - pm2 save

  deploy-cms-prod:
    desc: "Deploy the CMS for PROD."
    cmds:
      - task: _deploy-cms
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_PROD}}", CMS_PORT: "{{.CMS_PORT_PROD}}", PM2_NAME: "cms-prod" }

  deploy-cms-dev:
    desc: "Deploy the CMS for DEV."
    cmds:
      - task: _deploy-cms
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_DEV}}", CMS_PORT: "{{.CMS_PORT_DEV}}", PM2_NAME: "cms-dev" }

  deploy-prod:
    desc: "Deploying the applications for PROD."
    deps: [deploy-frontend-prod, deploy-cms-prod]

  deploy-dev:
    desc: "Deploying the applications for DEV."
    deps: [deploy-frontend-dev, deploy-cms-dev]

  _start:
    internal: true
    cmds:
      - unset name; PORT={{.APP_PORT}} NODE_ENV=production pm2 start npm --name {{.FRONTEND_NAME}} --cwd {{.DEPLOY_PATH}}/frontend -- run start -- --hostname 127.0.0.1
      - unset name; PORT={{.CMS_PORT}} NODE_ENV=production pm2 start npm --name {{.CMS_NAME}} --cwd {{.DEPLOY_PATH}}/cms -- run start

  start-prod:
    desc: "Starting the applications for PROD."
    cmds:
      - task: _start
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_PROD}}", APP_PORT: "{{.APP_PORT_PROD}}", CMS_PORT: "{{.CMS_PORT_PROD}}", FRONTEND_NAME: "frontend-prod", CMS_NAME: "cms-prod" }

  start-dev:
    desc: "Starting the applications for DEV."
    cmds:
      - task: _start
        vars: { DEPLOY_PATH: "{{.DEPLOY_PATH_DEV}}", APP_PORT: "{{.APP_PORT_DEV}}", CMS_PORT: "{{.CMS_PORT_DEV}}", FRONTEND_NAME: "frontend-dev", CMS_NAME: "cms-dev" }

  _stop:
    internal: true
    cmds:
      - pm2 delete {{.FRONTEND_NAME}} || true
      - pm2 delete {{.CMS_NAME}} || true

  stop-prod:
    desc: "Stops the applications for PROD via PM2."
    cmds:
      - task: _stop
        vars: { FRONTEND_NAME: "frontend-prod", CMS_NAME: "cms-prod" }

  stop-dev:
    desc: "Stops the applications for DEV via PM2."
    cmds:
      - task: _stop
        vars: { FRONTEND_NAME: "frontend-dev", CMS_NAME: "cms-dev" }
